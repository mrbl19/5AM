<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5am Bakery</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <h1>5AM Bakery</h1>
    </a>
  </div>
</header>

<section class="hero-2">

<h2>Review Your Order</h2>

<!-- display cart -->
<ul id="orderList"></ul>

<button type="button" onclick="restartOrder()">
  Start Over
</button>

<h3>Contact Info</h3>

<form action="https://formspree.io/f/xojyqdwv" method="POST">

  <input type="text" name="name" placeholder="name" required><br><br>
  <input type="email" name="email" placeholder="email" required><br><br>

  <!-- hidden field for email submission -->
  <input type="hidden" name="order_summary" id="order_summary">

  <button type="submit">PLACE ORDER!</button>

</form>

</section>

<script>
function restartOrder() {
  localStorage.removeItem("cart");
  window.location.href = "submit-order.html";
}

const cart = JSON.parse(localStorage.getItem("cart"));

console.log("CART DATA:", cart);

// display list
const list = document.getElementById("orderList");

cart.forEach(item => {
  const li = document.createElement("li");
  li.textContent =
    item.details
      ? `${item.qty} x ${item.item} (${item.details})`
      : `${item.qty} x ${item.item}`;
  list.appendChild(li);
});

// build email summary
document.getElementById("order_summary").value =
  cart.map(e =>
    e.details
      ? `${e.qty} x ${e.item} (${e.details})`
      : `${e.qty} x ${e.item}`
  ).join(" | ");

</script>

</body>
</html>
