<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5am Bakery</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <h1>5AM Bakery</h1>
    </a>
  </div>
</header>

<section class="hero-2">

<h2>Review Your Order</h2>

<p><strong>Date:</strong> <span id="show_date"></span></p>
<p><strong>Location & Time:</strong> <span id="show_time"></span></p>

<p><strong>Your Cart: </strong>
<ul id="orderList"></ul>

<button type="button" onclick="restartOrder()">
  Start Over
</button>

<h3>Contact Info</h3>

<form action="https://formspree.io/f/xojyqdwv" method="POST">

  <input type="text" name="name" placeholder="name" required><br><br>
  <input type="email" name="email" placeholder="email" required><br><br>

  <!-- hidden field for email submission -->
  <input type="hidden" name="order_summary" id="order_summary">
  <input type="hidden" name="date" id="date_hidden">
  <input type="hidden" name="location & time" id="time_location_hidden">

  <button type="submit">PLACE ORDER!</button>

</form>

</section>

<script>
function restartOrder() {
  localStorage.removeItem("cart");
  window.location.href = "submit-order.html";
}

const cart = JSON.parse(localStorage.getItem("cart"));
const date = localStorage.getItem("order_date");
const time_location = localStorage.getItem("order_location");

// console.log("CART DATA:", cart);

// display list
const list = document.getElementById("orderList");

cart.forEach(item => {
  const li = document.createElement("li");
  li.textContent =
    item.details
      ? `${item.qty} x ${item.item} (${item.details})`
      : `${item.qty} x ${item.item}`;
  list.appendChild(li);
});

// hidden inputs for form submission
document.getElementById("order_summary").value =
  cart.map(e =>
    e.details
      ? `${e.qty} x ${e.item} (${e.details})`
      : `${e.qty} x ${e.item}`
  ).join(" | ");

document.getElementById("date_hidden").value = date || "";
document.getElementById("time_location_hidden").value = time_location || "";

// to show on page
document.getElementById("show_date").textContent =
  date || "Not selected";

document.getElementById("show_time").textContent =
  time_location || "Not selected";

</script>

</body>
</html>
